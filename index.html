<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人主页</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; max-width: 400px; }
        h1 { color: #333; }
        p { color: #666; line-height: 1.6; }
        .btn { display: inline-block; margin-top: 20px; padding: 10px 20px; background-color: #2ea44f; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; transition: 0.3s; }
        .btn:hover { background-color: #2c974b; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="card">
        <h1>你好，我是 [你的名字]</h1>
        <p>这是我的第一个 GitHub 站点。我正在学习如何利用 GitHub 管理代码和自动化工作流。</p>
        <p>🚀 保持好奇，持续进步。</p>
        <a href="https://github.com" class="btn">关注我的 GitHub</a>
    </div>
</body>
</html>
